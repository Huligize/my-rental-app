<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        h3 { text-align: center; color: #0088cc; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        input:focus, textarea:focus { border-color: #0088cc; outline: none; box-shadow: 0 0 5px rgba(0,136,204,0.2); }
        button { width: 100%; background: #0088cc; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:active { transform: scale(0.98); background: #0077b5; }
    </style>
</head>
<body>
    <h3>🏠 የቤት መረጃ ማስገቢያ</h3>
    
    <div class="form-group">
        <label>የቤት ዓይነት (ለምሳሌ፡ ባለ 3 አፓርትመንት)</label>
        <input type="text" id="title" placeholder="ባለ 3 አፓርትመንት">
    </div>

    <div class="form-group">
        <label>📍 አድራሻ (ቦታ)</label>
        <input type="text" id="loc" placeholder="ለምሳሌ፡ ቦሌ">
    </div>

    <div class="form-group">
        <label>💰 ዋጋ (በብር)</label>
        <input type="number" id="prc" placeholder="ለምሳሌ፡ 45,000">
    </div>

    <div class="form-group">
        <label>☎️ የአከራይ ስልክ ቁጥር</label>
        <input type="tel" id="phn" placeholder="09...">
    </div>

    <div class="form-group">
        <label>📝 ዝርዝር መግለጫ</label>
        <textarea id="desc" rows="3" placeholder="ስለ ቤቱ ተጨማሪ መረጃ..."></textarea>
    </div>

    <button onclick="sendDataToBot()">ቻናሉ ላይ ልጥፍ</button>

   <script>
    // 1. Initialize the Telegram WebApp object
    const tg = window.Telegram.WebApp;

    // 2. Expand the app to full screen as soon as it opens
    tg.expand();

    function sendDataToBot() {
        // 3. Collect data from your input fields
        const data = {
            title: document.getElementById("title").value,
            location: document.getElementById("loc").value,
            price: document.getElementById("prc").value,
            phone: document.getElementById("phn").value,
            description: document.getElementById("desc").value
        };

        // 4. Simple Validation: Don't send empty data
        if (!data.location || !data.price || !data.phone) {
            alert("እባክዎ አስፈላጊ መረጃዎችን (ቦታ፣ ዋጋ እና ስልክ) ያስገቡ!");
            return;
        }

        // 5. THE CRITICAL HANDSHAKE
        // This sends the JSON string to your Python main.py
        try {
            tg.sendData(JSON.stringify(data));
            
            // 6. Close the Mini App window
            tg.close();
        } catch (error) {
            console.error("Telegram Mini App Error:", error);
            alert("ስህተት ተፈጥሯል፤ እባክዎ በቦቱ ውስጥ መክፈትዎን ያረጋግጡ።");
        }
    }
</script>
