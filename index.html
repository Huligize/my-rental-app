<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Betoch - Post Rental</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-button-color: #0088cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
        }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: var(--tg-theme-button-color); margin: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, textarea, select {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px;
            font-size: 16px; box-sizing: border-box;
        }
        .btn-submit {
            width: 100%; background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none; padding: 15px; border-radius: 10px;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🏠 ቤቶች (Betoch)</h2>
        <p>የሚከራይ ቤት መረጃ ያስገቡ</p>
    </div>

    <div class="form-group">
        <label>የቤት ዓይነት</label>
        <select id="title">
            <option value="ባለ 1 አፓርትመንት">ባለ 1 አፓርትመንት</option>
            <option value="ባለ 2 አፓርትመንት">ባለ 2 አፓርትመንት</option>
            <option value="ባለ 3 አፓርትመንት" selected>ባለ 3 አፓርትመንት</option>
            <option value="ቪላ ቤት">ቪላ ቤት</option>
        </select>
    </div>

    <div class="form-group">
        <label>📍 አድራሻ (ቦታ)</label>
        <input type="text" id="loc" placeholder="ለምሳሌ፡ ቦሌ 72" required>
    </div>

    <div class="form-group">
        <label>💰 ወርሃዊ ኪራይ (ብር)</label>
        <input type="number" id="prc" placeholder="ለምሳሌ፡ 45,000" required>
    </div>

    <div class="form-group">
        <label>☎️ የአከራይ ስልክ ቁጥር</label>
        <input type="tel" id="phn" placeholder="09..." required>
    </div>

    <div class="form-group">
        <label>📝 ዝርዝር መግለጫ</label>
        <textarea id="desc" rows="3"></textarea>
    </div>

    <button class="btn-submit" onclick="sendDataToBot()">ቻናሉ ላይ ልጥፍ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendDataToBot() {
            const data = {
                title: document.getElementById("title").value,
                location: document.getElementById("loc").value,
                price: document.getElementById("prc").value,
                phone: document.getElementById("phn").value,
                description: document.getElementById("desc").value
            };

            if(!data.location || !data.price || !data.phone) {
                tg.showAlert("እባክዎ አስፈላጊ መረጃዎችን ያስገቡ!");
                return;
            }

            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
