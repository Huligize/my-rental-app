<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ቤቶች (Betoch) - የሚከራይ ይለጥፉ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Nyala";
            background-color: #F7F9FC;
            color: #333;
            line-height: 1.6;
            padding-bottom: 30px;
        }

        /* TOP NAVIGATION */
        .top-nav {
            background-color: #fff;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #E1E8ED;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left { display: flex; align-items: center; gap: 12px; }
        .home-icon-bg {
            background-color: #4C59CF;
            color: white;
            border-radius: 50%;
            width: 34px; height: 34px;
            display: flex; justify-content: center; align-items: center;
        }

        .nav-title { font-size: 17px; font-weight: 700; }
        .telegram-btn {
            background-color: #6C5CE7;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        /* HERO SECTION */
        .hero-section {
            background-color: white;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .main-heading { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .heading-purple { color: #6C5CE7; }
        .sub-heading { font-size: 14px; color: #666; margin-bottom: 5px; }
        .warning-text { font-size: 12px; color: #E74C3C; font-weight: 600; }

        /* GRADIENT BANNER */
        .cta-banner {
            background: linear-gradient(135deg, #4C59CF 0%, #6C5CE7 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin: 0 15px 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cta-text h3 { font-size: 18px; margin-bottom: 4px; }
        .cta-text p { font-size: 12px; opacity: 0.9; }
        .cta-icon-bg {
            background-color: rgba(255, 255, 255, 0.2);
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px;
        }

        /* FORM SECTIONS */
        .form-section {
            background-color: white;
            padding: 20px;
            margin: 0 15px 15px 15px;
            border-radius: 15px;
            border: 1px solid #E1E8ED;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #F0F0F0;
            padding-bottom: 10px;
        }

        .icon-bg {
            border-radius: 8px;
            width: 32px; height: 32px;
            display: flex; justify-content: center; align-items: center;
        }

        .section-title { font-size: 16px; font-weight: 700; }

        .form-group { margin-bottom: 18px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        .required-star { color: #E74C3C; margin-left: 2px; }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #E1E8ED;
            border-radius: 10px;
            font-size: 16px;
            background-color: #fff;
        }

        /* MEDIA UPLOAD BOXES */
        .dashed-upload-box {
            width: 100%;
            height: 110px;
            border: 2px dashed #CBD5E0;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fafafa;
            margin-top: 5px;
        }

        .upload-content { text-align: center; color: #718096; }
        .upload-plus { font-size: 28px; display: block; }
        .upload-text { font-size: 12px; font-weight: 600; }

        /* FOOTER BUTTON */
        .footer-container { padding: 10px 15px; text-align: center; }
        .btn-post {
            width: 100%;
            background: linear-gradient(135deg, #4C59CF 0%, #6C5CE7 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }

        .agreement { font-size: 11px; color: #999; margin-top: 12px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-left">
            <div class="home-icon-bg">🏠</div>
            <div class="nav-title">ያለ ደላላ</div>
        </div>
        <button class="telegram-btn">ቴሌግራም</button>
    </div>

    <div class="hero-section">
        <h1 class="main-heading">የሚከራይ <span class="heading-purple">ንብረት ይለጥፉ</span></h1>
        <p class="sub-heading">ንብረትዎን ቀለል ባለ መንገድ ያከራዩ።</p>
        <p class="warning-text">ልብ በሉ: ደላላ አናስተናግድም!</p>
    </div>

    <div class="cta-banner">
        <div class="cta-text">
            <h3>አዲስ የሚከራይ ልጥፍ</h3>
            <p>ለመጀመር ከታች ያለውን ዝርዝር ይሙሉ</p>
        </div>
        <div class="cta-icon-bg">📋</div>
    </div>

    <div class="form-section">
        <div class="section-header">
            <div class="icon-bg" style="background:#EBF8FF; color:#3182CE;">🕐</div>
            <div class="section-title">መሰረታዊ መረጃ</div>
        </div>

        <div class="form-group">
            <label class="form-label">Item Title | መግለጫ ስም <span class="required-star">*</span></label>
            <input type="text" id="title" class="form-input" placeholder="ርዕስ ያስገቡ (ለምሳሌ የሚከራይ መኖርያ ቤት)">
        </div>

        <div class="form-group">
            <label class="form-label">Price | ዋጋ በ ብር <span class="required-star">*</span></label>
            <input type="number" id="price" class="form-input" placeholder="$ 0.00">
        </div>

        <div class="form-group">
            <label class="form-label">Contact Phone | ስልክ ቁጥር <span class="required-star">*</span></label>
            <input type="tel" id="phone" class="form-input" placeholder="ስልክ ቁጥር ያስገቡ">
        </div>

        <div class="form-group">
            <label class="form-label">Location | አድራሻ <span class="required-star">*</span></label>
            <input type="text" id="location" class="form-input" placeholder="አድራሻ ያስገቡ">
        </div>

        <div class="form-group">
            <label class="form-label">Description | ዝርዝር መግለጫ <span class="required-star">*</span></label>
            <textarea id="description" class="form-input" style="height:80px;" placeholder="ማንኛውንም አስፈላጊ ዝርዝሮችን ይግለጹ..."></textarea>
        </div>
    </div>

    <div class="form-section">
        <div class="section-header">
            <div class="icon-bg" style="background:#E6FFFA; color:#38A169;">🖼️</div>
            <div class="section-title">Video & Photo | ቪዲዮ እና ፎቶ</div>
        </div>

        <div class="form-group">
            <label class="form-label">የንብረት ፎቶ ያስገቡ <span class="required-star">*</span></label>
            <div class="dashed-upload-box">
                <div class="upload-content"><span class="upload-plus">+</span><span class="upload-text">ፎቶ ይጨምሩ</span></div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">አጭር ቪዲዮ (ቢፈልጉ ይጨምሩ)</label>
            <div class="dashed-upload-box">
                <div class="upload-content"><span class="upload-plus">📹</span><span class="upload-text">ቪዲዮ ይጨምሩ</span></div>
            </div>
        </div>
    </div>

    <div class="footer-container">
        <button class="btn-post" onclick="sendData()">+ ይለጥፉ</button>
        <p class="agreement">በመጠቀምዎ የአገልግሎት ውል እና የግላዊነት ፖሊሲ ተስማምተዋል።</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendData() {
            const data = {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                phone: document.getElementById('phone').value,
                location: document.getElementById('location').value,
                description: document.getElementById('description').value
            };

            if(!data.title || !data.price || !data.phone || !data.location) {
                tg.showAlert("እባክዎ ሁሉንም አስፈላጊ መረጃዎች ያስገቡ!");
                return;
            }

            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
